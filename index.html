// ============================================================
// INDICATORS
// ============================================================
function ema(data,period){
  const k=2/(period+1),r=[data[0]];
  for(let i=1;i<data.length;i++) r.push(data[i]*k+r[i-1]*(1-k));
  return r;
}
function sma(data,period){
  const r=[];
  for(let i=0;i<data.length;i++){
    if(i<period-1){r.push(null);continue}
    let s=0;for(let j=i-period+1;j<=i;j++) s+=data[j];
    r.push(s/period);
  }
  return r;
}
function calcMACD(closes,fast=12,slow=26,signal=9){
  const emaFast=ema(closes,fast),emaSlow=ema(closes,slow);
  const dif=emaFast.map((v,i)=>v-emaSlow[i]);
  const dea=ema(dif.slice(slow-1),signal);
  const deaFull=[];
  for(let i=0;i<dif.length;i++){
    if(i<slow+signal-2){deaFull.push(null);continue}
    deaFull.push(dea[i-(slow+signal-2)]);
  }
  const macd=dif.map((v,i)=>deaFull[i]!==null?2*(v-deaFull[i]):null);
  return {dif,dea:deaFull,macd};
}
function calcKDJ(highs,lows,closes,n=9){
  const k=[],d=[],j=[];
  for(let i=0;i<closes.length;i++){
    if(i<n-1){k.push(null);d.push(null);j.push(null);continue}
    const hh=Math.max(...highs.slice(i-n+1,i+1));
    const ll=Math.min(...lows.slice(i-n+1,i+1));
    const rsv=(closes[i]-ll)/(hh-ll||1)*100;
    const pk=k.length>0&&k[k.length-1]!==null?k[k.length-1]:50;
    const pd=d.length>0&&d[d.length-1]!==null?d[d.length-1]:50;
    const kv=2/3*pk+1/3*rsv;
    k.push(kv);d.push(2/3*pd+1/3*kv);j.push(3*kv-2*(2/3*pd+1/3*kv));
  }
  return {k,d,j};
}
function calcRSI(closes,period=14){
  const rsi=[];
  let gain=0,loss=0;
  for(let i=1;i<closes.length;i++){
    const diff=closes[i]-closes[i-1];
    if(i<=period){if(diff>0)gain+=diff;else loss-=diff;}
    if(i===period){gain/=period;loss/=period;rsi.push(100-(100/(1+gain/(loss||1))));}
    if(i>period){
      gain=(gain*(period-1)+(diff>0?diff:0))/period;
      loss=(loss*(period-1)+(diff<0?-diff:0))/period;
      rsi.push(100-(100/(1+gain/(loss||1))));
    }
  }
  return rsi;
}
function calcATR(highs,lows,closes,period=14){
  const tr=[],atr=[];
  for(let i=0;i<closes.length;i++){
    if(i===0){tr.push(highs[i]-lows[i]);continue}
    tr.push(Math.max(highs[i]-lows[i],Math.abs(highs[i]-closes[i-1]),Math.abs(lows[i]-closes[i-1])));
  }
  const ma=sma(tr,period);
  return ma;
}

// Generate multi-day mock data for backtest (deterministic by code+day)
function generateBacktestStocks(baseStocks,dayOffset){
  return baseStocks.map(s=>{
    const R=(n)=>S(s.code+'_bt'+dayOffset+'_'+n);
    const noise=(R(0)-0.5)*4;
    const newPct=s.pct_change+noise+(dayOffset%5-2)*0.5;
    const newPrice=s.price*(1+newPct/100);
    return {...s,
      price:parseFloat(newPrice.toFixed(2)),
      pct_change:parseFloat(newPct.toFixed(2)),
      prev_close:s.price,
      high:parseFloat((newPrice*(1+R(1)*0.03)).toFixed(2)),
      low:parseFloat((newPrice*(1-R(2)*0.03)).toFixed(2)),
      open:parseFloat((newPrice*(1+(R(3)-0.5)*0.02)).toFixed(2)),
      amount:s.amount*(1+noise/100),
      volume_ratio:parseFloat((s.volume_ratio*(1+(R(4)-0.5)*0.5)).toFixed(2)),
      turnover:parseFloat((s.turnover*(1+(R(5)-0.5)*0.3)).toFixed(2)),
      main_net_inflow:s.main_net_inflow*(1+(R(6)-0.5)*1.5),
      amplitude:parseFloat((Math.abs(newPct)*1.5+R(7)*2).toFixed(2)),
    };
  });
}

// ============================================================
// REAL DATA (EAST MONEY API)
// ============================================================
async function fetchRealStocks(){
  // East Money API: A-share market data
  // Fields: f2=price, f3=pct_change, f4=change, f5=volume, f6=amount, f7=amplitude
  // f8=turnover_rate, f9=PE(dynamic), f10=volume_ratio, f12=code, f14=name
  // f15=high, f16=low, f17=open, f18=prev_close, f20=market_cap, f21=float_mcap
  // f23=PB, f62=main_net_inflow, f115=PE(static)
  const fields='f2,f3,f4,f5,f6,f7,f8,f9,f10,f12,f14,f15,f16,f17,f18,f20,f21,f23,f62,f115';
  const fs='m:0+t:6,m:0+t:80,m:1+t:2,m:1+t:23';  // All A-shares
  const url=`https://push2.eastmoney.com/api/qt/clist/get?pn=1&pz=500&po=1&np=1&fltt=2&invt=2&fid=f3&fs=${encodeURIComponent(fs)}&fields=${fields}&ut=bd1d9ddb04089700cf9c27f6f7426281`;

  try{
    const resp=await fetch(url,{headers:{'Accept':'application/json'}});
    if(!resp.ok) throw new Error(`HTTP ${resp.status}`);
    const json=await resp.json();
    if(!json.data||!json.data.diff) throw new Error('API响应格式异常');

    return json.data.diff.filter(item=>{
      // Filter out new stocks (within 60 days), ST stocks, etc
      const name=item.f14||'';
      if(name.includes('ST')||name.includes('*ST')||name.includes('退')) return false;
      const pct=item.f3;
      if(pct===null||pct===undefined) return false;
      return true;
    }).map(item=>({
      code:String(item.f12||''),
      name:String(item.f14||''),
      price:parseFloat(item.f2||0),
      pct_change:parseFloat(item.f3||0),
      turnover:parseFloat(item.f8||0),
      volume_ratio:parseFloat(item.f10||1),
      amount:parseFloat(item.f6||0),
      float_mcap:parseFloat(item.f21||0),
      pe:parseFloat(item.f9||0)||parseFloat(item.f115||0)||0,
      pb:parseFloat(item.f23||0),
      amplitude:parseFloat(item.f7||0),
      main_net_inflow:parseFloat(item.f62||0),
      prev_close:parseFloat(item.f18||0)||parseFloat(item.f2||0)/(1+parseFloat(item.f3||0)/100),
      high:parseFloat(item.f15||0),
      low:parseFloat(item.f16||0),
      open:parseFloat(item.f17||0),
    }));
  }catch(e){
    console.error('API请求失败:',e);
    return null;
  }
}

async function fetchMarketIndex(){
  // Tencent API for indices (returns GBK encoding)
  const codes=['sh000001','sz399001','sz399006'];
  try{
    const resp=await fetch(`https://qt.gtimg.cn/q=${codes.join(',')}`);
    // Tencent API returns GBK, not UTF-8
    const text=await decodeGBK(resp);
    const result={};
    for(const line of text.split('\n')){
      if(!line.includes('="')) continue;
      const m=line.match(/v_(\w+)="(.+)"/);
      if(!m) continue;
      const fields=m[2].split('~');
      result[m[1]]={
        name:fields[1]||m[1],
        price:parseFloat(fields[3]||0),
        pct_change:parseFloat(fields[32]||0),
        high:parseFloat(fields[33]||0),
        low:parseFloat(fields[34]||0),
      };
    }
    return result;
  }catch(e){
    console.error('指数获取失败:',e);
    return null;
  }
}

// ============================================================
// SCREENING ENGINE
// ============================================================
function applyPreFilter(stocks){
  return stocks.filter(s=>{
    if(s.pct_change<CFG.PCT_CHANGE_MIN||s.pct_change>CFG.PCT_CHANGE_MAX) return false;
    if(s.turnover<CFG.TURNOVER_RATE_MIN||s.turnover>CFG.TURNOVER_RATE_MAX) return false;
    if(s.float_mcap<CFG.FLOAT_MCAP_MIN||s.float_mcap>CFG.FLOAT_MCAP_MAX) return false;
    if(!s.main_net_inflow||isNaN(s.main_net_inflow)||s.main_net_inflow<CFG.MAIN_NET_INFLOW_MIN) return false;
    if(!s.name||s.name.includes('ST')||s.name.includes('*ST')) return false;
    return true;
  });
}

// Deterministic PRNG (Mulberry32) — seeded by stock code for reproducible scoring
function S(s){let h=0;for(let i=0;i<s.length;i++){h=((h<<5)-h+s.charCodeAt(i))|0;}let t=h+0x6D2B79F5;t=Math.imul(t^t>>>15,t|1);t=t+Math.imul(t^t>>>7,t|61);return((t^t>>>14)>>>0)/4294967296;}

// Simulate tail-period analysis (deterministic, seeded by stock.code)
function simulateTailAnalysis(stock){
  const pct=stock.pct_change,amp=stock.amplitude,vr=stock.volume_ratio;
  const r=(n)=>S(stock.code+'_t'+n);
  const tailPct=pct*(0.5+r(0)*0.3);
  const tailStability=Math.min(1,1-Math.abs(amp-Math.abs(pct)*1.5)/10);
  let patternType,patternScore;
  if(tailPct>2&&vr>1.5&&tailStability>0.6){
    patternType='steady_rise';patternScore=18+r(1)*2;
  }else if(tailPct>3&&vr>2){
    patternType='sudden_spike';patternScore=13+r(1)*4;
  }else if(tailPct>1){
    patternType='neutral';patternScore=10+r(1)*3;
  }else{
    patternType='weak';patternScore=3+r(1)*4;
  }
  return {pattern_type:patternType,tail_strength:tailStability,tail_pct:tailPct,tail_vr:vr,pattern_score:patternScore};
}

// Simulate trend indicators (deterministic, seeded by stock.code)
function simulateTrend(stock){
  const pct=stock.pct_change,vr=stock.volume_ratio;
  const r=(n)=>S(stock.code+'_d'+n);
  const ma5=pct>0?1:0,ma10=pct>1?1:0,ma20=pct>0.5?1:0,ma60=pct>-1?1:0;
  const maAbove=ma5+ma10+ma20+ma60;
  const highWarn=pct>5&&vr>2.5;
  const atr=stock.price*0.025*(1+(r(0)-0.5)*0.5);
  return {ma_above_count:maAbove,high_position_warning:highWarn,atr,pct:atr/stock.price*100,ma5,ma10,ma20,ma60};
}

function scoreAll(candidates,tailData,trendData,marketEnv){
  const results=[];
  for(const s of candidates){
    const tail=tailData?tailData[s.code]||simulateTailAnalysis(s):simulateTailAnalysis(s);
    const trend=trendData?trendData[s.code]||simulateTrend(s):simulateTrend(s);

    const scores={};

    // 1. 涨跌幅 (15pts) - moderate gain preferred
    const ap=Math.abs(s.pct_change);
    if(s.pct_change>=4&&s.pct_change<=6) scores.pct_change=15;
    else if(s.pct_change>=3&&s.pct_change<=7) scores.pct_change=12;
    else if(s.pct_change>=2&&s.pct_change<=8) scores.pct_change=8;
    else scores.pct_change=Math.max(0,15-ap*2);

    // 2. 尾盘信号 (20pts)
    if(tail.pattern_type==='steady_rise') scores.tail_signal=20;
    else if(tail.pattern_type==='sudden_spike') scores.tail_signal=14;
    else if(tail.pattern_type==='neutral') scores.tail_signal=9;
    else scores.tail_signal=4;

    // 3. 换手率 (10pts)
    if(s.turnover>=8&&s.turnover<=15) scores.turnover=10;
    else if(s.turnover>=5&&s.turnover<=20) scores.turnover=7;
    else scores.turnover=Math.max(0,10-Math.abs(s.turnover-10)*0.5);

    // 4. 流通市值 (8pts)
    const fmcB=s.float_mcap/1e8;
    if(fmcB>=100&&fmcB<=500) scores.float_mcap=8;
    else if(fmcB>=50&&fmcB<=1000) scores.float_mcap=6;
    else scores.float_mcap=Math.max(2,8-Math.abs(Math.log10(fmcB)-2.5)*3);

    // 5. 资金流向 (12pts)
    const nif=s.main_net_inflow/1e4;
    if(nif>=5000) scores.fund_flow=12;
    else if(nif>=3000) scores.fund_flow=9;
    else if(nif>=2000) scores.fund_flow=6;
    else scores.fund_flow=3;

    // 6. 板块排名 (8pts)
    scores.sector_rank=4;  // Base - in full version fetches real sector rank

    // 7. 安全过滤 (7pts)
    let safety=7;
    if(s.pe&&s.pe<0) safety-=3;
    if(s.amplitude>10) safety-=2;
    if(s.volume_ratio>4) safety-=2;
    scores.safety_filter=Math.max(0,safety);

    // 8. 大盘环境 (10pts)
    if(marketEnv){
      if(marketEnv.status==='good') scores.market_env=10;
      else if(marketEnv.status==='warning') scores.market_env=6;
      else if(marketEnv.status==='bad') scores.market_env=2;
      else scores.market_env=5;
    }else{
      scores.market_env=5;
    }

    // 9. 趋势位置 (10pts)
    let trendScore=5;
    if(trend.ma_above_count>=4) trendScore=10;
    else if(trend.ma_above_count>=3) trendScore=7;
    else if(trend.ma_above_count>=2) trendScore=4;
    else trendScore=2;
    if(trend.high_position_warning) trendScore=Math.min(trendScore,4);
    scores.trend_position=trendScore;

    // Weighted total
    const total=Object.entries(CFG.WEIGHTS).reduce((sum,[k,w])=>sum+(scores[k]||0)*(w/100)*100,0);
    const totalRounded=Math.round(total*10)/10;

    results.push({
      ...s,
      score_pct_change:scores.pct_change,
      score_tail_signal:scores.tail_signal,
      score_turnover:scores.turnover,
      score_float_mcap:scores.float_mcap,
      score_fund_flow:scores.fund_flow,
      score_sector_rank:scores.sector_rank,
      score_safety_filter:scores.safety_filter,
      score_market_env:scores.market_env,
      score_trend_position:scores.trend_position,
      total_score:totalRounded,
      tail_pattern:tail.pattern_type,
      trend_ma:trend.ma_above_count,
      trend_high_warn:trend.high_position_warning,
      atr:trend.atr,
      atr_pct:trend.pct,
    });
  }
  results.sort((a,b)=>b.total_score-a.total_score);
  return results;
}

function applySectorDiversification(results){
  const seen={},diversified=[];
  for(const r of results){
    const sector=classifySector(r.name);
    if(!seen[sector]){seen[sector]=true;diversified.push(r);}
  }
  return diversified;
}

// ============================================================
// POSITION SIZING
// ============================================================
function calcKellyFraction(winRate,avgWin,avgLoss){
  if(avgLoss<=0) return 0.1;
  const b=avgWin/avgLoss,p=winRate,q=1-p;
  let kelly=(p*b-q)/b;
  if(kelly<=0) return 0;
  kelly*=0.5;  // Half-Kelly
  return Math.min(kelly,0.5);
}
function calcVolatilityAdj(atrPct,baseline=3.0){
  if(atrPct<=0) return 1;
  return Math.max(0.3,Math.min(1.5,baseline/atrPct));
}
function calcPositionSize(capital,price,kelly,atrPct,marketFactor,riskScore){
  const baseAlloc=capital*kelly;
  const volAdj=calcVolatilityAdj(atrPct);
  const riskFactor={低:1.0,中:0.7,高:0.3}[riskScore]||0.7;
  let adjusted=baseAlloc*volAdj*marketFactor*riskFactor;
  let shares=Math.floor(adjusted/price/100)*100;
  shares=Math.max(100,shares);
  return {shares,amount:shares*price,pct:shares*price/capital*100};
}

// ============================================================
// SELL STRATEGY
// ============================================================
function generateSellPlan(stock,marketEnv){
  const price=stock.price,score=stock.total_score;
  const targetPct=score>=85?4.0:score>=75?3.0:2.0;
  const stopPct=-2.0;
  let timeLimit='09:35';
  if(score>=85) timeLimit='09:45';
  else if(score<75) timeLimit='09:32';

  let marketFactor=1.0,marketNote='';
  if(marketEnv){
    if(marketEnv.status==='bad'){marketFactor=0.5;marketNote='大盘恶劣，加速卖出';timeLimit='09:32'}
    else if(marketEnv.status==='warning'){marketFactor=0.8;marketNote='大盘偏弱，降低预期'}
  }

  const targetPrice=price*(1+(targetPct*marketFactor)/100);
  const stopPrice=price*(1+stopPct/100);
  const pe=stock.pe||0;
  const riskLevel=(pe<0||stock.volume_ratio>5||score<73)?'高':(score<80?'中':'低');

  // Dynamic ATR stop (aligned with Python calc_dynamic_stop: stop=atr*2, target=atr*3)
  let atrStop=null,atrTarget=null,atrStopPct=null,atrTargetPct=null,stopMethod='固定';
  if(stock.atr&&stock.atr>0){
    // Python: stop_loss = entry_price - atr * atr_multiplier (default 2.0)
    // Python: take_profit = entry_price + atr * atr_multiplier * 1.5
    atrStop=parseFloat((price-stock.atr*2).toFixed(2));
    atrTarget=parseFloat((price+stock.atr*3).toFixed(2));
    atrStopPct=parseFloat(((atrStop-price)/price*100).toFixed(2));
    atrTargetPct=parseFloat(((atrTarget-price)/price*100).toFixed(2));
    stopMethod='ATR动态';
  }

  const finalStop=atrStop?Math.max(atrStop,stopPrice):stopPrice;
  const finalTarget=atrTarget?Math.max(atrTarget,targetPrice*0.9):targetPrice;

  return {
    code:stock.code,name:stock.name,entry_price:price,
    target_price:parseFloat(finalTarget.toFixed(2)),
    stop_loss_price:parseFloat(finalStop.toFixed(2)),
    target_profit_pct:parseFloat(((finalTarget-price)/price*100).toFixed(1)),
    stop_loss_pct:parseFloat(((finalStop-price)/price*100).toFixed(1)),
    time_limit:timeLimit,risk_level:riskLevel,
    confidence:score>=85?'高':score>=75?'中':'低',
    market_note:marketNote,stop_method:stopMethod,
    atr_stop:atrStop,atr_target:atrTarget,
    atr_stop_pct:atrStopPct,atr_target_pct:atrTargetPct,
  };
}

async function runPremarket(){

    for(const line of text.split('\n')){

      results[m[1]]={name,price:parseFloat(price.toFixed(2)),pct:parseFloat(pct.toFixed(2))};
    }

    // Calculate scores
    const usData=Object.entries(results).filter(([k])=>k.startsWith('gb_'));

    let score=100;

      else if(avgPct<0){score-=15;warnings.push(`⚠️ 隔夜美股小跌 (均${avgPct.toFixed(2)}%)`)}

    if(hkData.length>0){
      const hsi=results['rt_hkHSI'];

        if(hsi.pct>=1) reasons.push(`✅ 港股走强 (恒指${hsi.pct>0?'+':''}${hsi.pct.toFixed(2)}%)`);
        else if(hsi.pct<-1){score-=20;warnings.push(`🔴 港股走弱 (恒指${hsi.pct.toFixed(2)}%)`)}
        else if(hsi.pct<0){score-=10;warnings.push(`⚠️ 港股偏弱`)}
      }
    }

    let overall,advice,emoji;
    if(score>=80){overall='go';advice='正常执行一夜持股策略';emoji='🟢'}
    else if(score>=60){overall='caution';advice='建议缩小仓位至50-70%';emoji='🟡'}
    else if(score>=40){overall='reduce';advice='建议仓位不超过30%或空仓';emoji='🟠'}
    else{overall='skip';advice='强烈建议空仓观望';emoji='🔴'}

    content.innerHTML=`
      <div style="text-align:center;margin:8px 0">
        <div style="font-size:48px">${emoji}</div>
        <div style="font-size:18px;font-weight:700">${advice}</div>
        <div style="font-size:14px;color:var(--sub)">外部环境评分: ${score}/100</div>
      </div>
      ${reasons.length?`<div style="margin-top:12px"><strong>利好:</strong><br>${reasons.map(r=>`<div style="font-size:13px;padding:2px 0">${r}</div>`).join('')}</div>`:''}
      ${warnings.length?`<div style="margin-top:8px"><strong>风险:</strong><br>${warnings.map(w=>`<div style="font-size:13px;padding:2px 0">${w}</div>`).join('')}</div>`:''}

      </div>

  }
}

async function runBacktest(){
  const days=parseInt($('btDays').value||30);
  const content=$('backtestContent');
  content.innerHTML='<div style="text-align:center;padding:20px"><span class="spinner"></span> 回测中... <span id="btProg" style="font-size:12px;color:var(--sub)"></span></div>';

  const CHUNK=5;
  const baseStocks=generateMockStocks().slice(0,50);
  const allTrades=[];
  let totalWins=0,totalLosses=0;

  for(let d=0;d<days;d++){
    const dayStocks=generateBacktestStocks(baseStocks,d);
    const candidates=applyPreFilter(dayStocks);
    const scored=scoreAll(candidates,null,null,null);
    const qualified=scored.filter(s=>s.total_score>=CFG.MIN_SCORE);
    const diversified=applySectorDiversification(qualified);
    const picks=diversified.slice(0,CFG.MAX_OUTPUT);

    for(const pick of picks){
      const nextDayRet=(S(pick.code+'_btret_'+d)-0.45)*6;
      allTrades.push(nextDayRet);
      if(nextDayRet>0) totalWins++;
      else totalLosses++;
    }

    // Yield to browser every chunk so UI stays responsive
    if(d%CHUNK===CHUNK-1||d===days-1){
      const prog=$('btProg'); if(prog) prog.textContent=Math.round((d+1)/days*100)+'%';
      await new Promise(r=>setTimeout(r,0));
    }
  }

  const totalTrades=allTrades.length;
  const winRate=totalTrades>0?totalWins/totalTrades*100:0;
  const avgReturn=allTrades.length>0?allTrades.reduce((a,b)=>a+b,0)/allTrades.length:0;
  const wins=allTrades.filter(r=>r>0),losses=allTrades.filter(r=>r<=0);
  const avgWin=wins.length>0?wins.reduce((a,b)=>a+b,0)/wins.length:0;
  const avgLoss=losses.length>0?Math.abs(losses.reduce((a,b)=>a+b,0)/losses.length):0;

  const mean=avgReturn;
  const variance=allTrades.length>1?allTrades.reduce((s,r)=>s+(r-mean)**2,0)/(allTrades.length-1):1;
  const stdDev=Math.sqrt(variance);
  const sharpe=stdDev>0?mean/stdDev*Math.sqrt(252):0;

  let cumRet=1,maxRet=1,maxDD=0;
  for(const r of allTrades){
    cumRet*=(1+r/100);
    maxRet=Math.max(maxRet,cumRet);
    maxDD=Math.max(maxDD,(cumRet-maxRet)/maxRet*100);
  }

  const kelly=calcKellyFraction(winRate/100,avgWin,avgLoss);

  content.innerHTML=`
    <div class="info-grid">
      <div class="info-item"><div class="info-num">${totalTrades}</div><div class="info-label">总交易次数</div></div>
      <div class="info-item"><div class="info-num ${winRate>=50?'red':'green'}">${winRate.toFixed(1)}%</div><div class="info-label">胜率</div></div>
      <div class="info-item"><div class="info-num ${avgReturn>=0?'red':'green'}">${avgReturn>=0?'+':''}${avgReturn.toFixed(2)}%</div><div class="info-label">平均收益</div></div>
      <div class="info-item"><div class="info-num">${sharpe.toFixed(2)}</div><div class="info-label">年化夏普</div></div>
      <div class="info-item"><div class="info-num ${maxDD<10?'red':'green'}">${maxDD.toFixed(1)}%</div><div class="info-label">最大回撤</div></div>
      <div class="info-item"><div class="info-num">${avgWin>avgLoss?'👍':'👎'}</div><div class="info-label">盈亏比 ${(avgWin/(avgLoss||1)).toFixed(2)}</div></div>
    </div>
    <div class="row"><span class="label">Kelly建议仓位</span><span class="value">${(kelly*100).toFixed(1)}%</span></div>
    <div class="row"><span class="label">平均盈利</span><span class="value red">+${avgWin.toFixed(2)}%</span></div>
    <div class="row"><span class="label">平均亏损</span><span class="value green">-${avgLoss.toFixed(2)}%</span></div>
    <div style="font-size:11px;color:var(--sub);margin-top:12px">✅ 评分与回测结果确定化 (同种子=同结果) — 基于${days}天模拟，日均${allTrades.length>0?(allTrades.length/days).toFixed(0):0}只标的</div>
  `;
}

  if(!results.length){
    area.innerHTML=`<div class="card"><div style="text-align:center;padding:40px;color:var(--sub)">📭 无符合条件的标的<br><small>来源: ${dataSource}</small></div></div>`;
    return;
  }

  const sectorCounts={};
  results.forEach(r=>{const s=classifySector(r.name);sectorCounts[s]=(sectorCounts[s]||0)+1});

  area.innerHTML=`
    <div class="card">
      <div class="card-title">📊 筛选结果 <span style="font-weight:400;font-size:12px;color:var(--sub)">(${dataSource})</span></div>
      <div style="font-size:12px;color:var(--sub);margin-bottom:8px">
        入选 ${results.length} 只 | 行业分布: ${Object.entries(sectorCounts).map(([k,v])=>`${k}(${v})`).join(' · ')}
      </div>
      <div class="tbl-wrap">
        <table>
          <thead>
            <tr><th>代码</th><th>名称</th><th>涨跌%</th><th>换手%</th><th>市值(亿)</th><th>主力(万)</th><th>量比</th><th>行业</th><th>风险</th><th>总分</th><th>操作</th></tr>
          </thead>
          <tbody>
            ${results.map((r,i)=>{
              const sector=classifySector(r.name);
              const risk=r.pe<0||r.volume_ratio>5||r.total_score<73?'高':r.total_score<80?'中':'低';
              const riskBadge=risk==='高'?'badge-red':risk==='中'?'badge-yellow':'badge-green';
              const fmcB=(r.float_mcap/1e8).toFixed(1);
              const nifW=(r.main_net_inflow/1e4).toFixed(0);
              const scoreBarW=Math.min(100,r.total_score);
              return `<tr onclick="showDetail('${r.code}')">
                <td>${r.code}</td><td style="font-weight:600">${r.name}</td>
                <td class="${r.pct_change>0?'red':'green'}">${r.pct_change>0?'+':''}${r.pct_change.toFixed(2)}</td>
                <td>${r.turnover.toFixed(2)}</td><td>${fmcB}</td><td>${nifW}</td>
                <td>${r.volume_ratio.toFixed(2)}</td>
                <td><span class="badge badge-blue">${sector}</span></td>
                <td><span class="badge ${riskBadge}">${risk}</span></td>
                <td style="font-weight:700;color:var(--blue)">${r.total_score.toFixed(1)}<span class="score-bar-bg"><span class="score-bar" style="width:${scoreBarW}%"></span></span></td>
                <td><button class="btn-sm" style="background:var(--blue);font-size:11px;padding:3px 8px" onclick="event.stopPropagation();showDetail('${r.code}')">详情</button></td>
              </tr>`;
            }).join('')}
          </tbody>
        </table>
      </div>
    </div>

    <div class="card">
      <div class="card-title">📊 评分明细 (Top ${Math.min(5,results.length)})</div>
      <div class="tbl-wrap">
        <table style="min-width:600px">
          <thead><tr><th>名称</th><th>涨跌</th><th>尾盘</th><th>换手</th><th>市值</th><th>资金</th><th>板块</th><th>安全</th><th>大盘</th><th>趋势</th><th>总分</th></tr></thead>
          <tbody>
            ${results.slice(0,5).map(r=>`
              <tr>
                <td style="font-weight:600">${r.name}</td>
                <td>${r.score_pct_change||0}</td><td>${r.score_tail_signal||0}</td>
                <td>${r.score_turnover||0}</td><td>${r.score_float_mcap||0}</td>
                <td>${r.score_fund_flow||0}</td><td>${r.score_sector_rank||0}</td>
                <td>${r.score_safety_filter||0}</td><td>${r.score_market_env||0}</td>
                <td>${r.score_trend_position||0}</td>
                <td style="font-weight:700;color:var(--blue)">${r.total_score.toFixed(1)}</td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      </div>
    </div>

    <div class="card">
      <div class="card-title">💰 仓位分配建议</div>
      ${(()=>{
        const kelly=calcKellyFraction(0.50,2.0,1.5);
        const mf=lastMarketEnv?{good:1.0,warning:0.8,bad:0.5}[lastMarketEnv.status]||1.0:1.0;
        const rows=results.map((r,i)=>{
          const pos=calcPositionSize(CFG.TOTAL_CAPITAL,r.price,kelly,r.atr_pct||3.0,mf,r.pe<0||r.volume_ratio>5||r.total_score<73?'高':r.total_score<80?'中':'低');
          return {...pos,name:r.name,code:r.code,risk:r.pe<0||r.volume_ratio>5||r.total_score<73?'高':r.total_score<80?'中':'低'};
        });
        const totalAmt=rows.reduce((s,r)=>s+r.amount,0);
        return `
          <div style="font-size:12px;color:var(--sub);margin-bottom:8px">
            Kelly仓位: ${(kelly*100).toFixed(1)}% | 资金: ¥${CFG.TOTAL_CAPITAL.toLocaleString()} | 大盘系数: ${mf.toFixed(1)}
          </div>
          <div class="tbl-wrap"><table style="min-width:500px">
            <thead><tr><th>股票</th><th>风险</th><th>建议股数</th><th>金额</th><th>占比</th></tr></thead>
            <tbody>
              ${rows.map(r=>`<tr>
                <td style="font-weight:600">${r.name}</td>
                <td><span class="badge ${r.risk==='高'?'badge-red':r.risk==='中'?'badge-yellow':'badge-green'}">${r.risk}</span></td>
                <td>${r.shares}股</td><td>¥${r.amount.toLocaleString()}</td>
                <td style="font-weight:600">${r.pct.toFixed(1)}%</td>
              </tr>`).join('')}
            </tbody>
          </table></div>
          <div style="margin-top:8px;font-size:13px">
            📌 总建议仓位: <strong>${totalAmt.toLocaleString()}元 (${(totalAmt/CFG.TOTAL_CAPITAL*100).toFixed(1)}%)</strong>
            ${totalAmt>CFG.TOTAL_CAPITAL*0.7?`<span style="color:var(--red)"> ⚠️ 超过70%，建议只选Top3</span>`:''}
          </div>
        `;
      })()}
    </div>

    <div style="text-align:center;padding:8px">
      <button class="btn btn-outline" onclick="exportCSV()" style="display:inline;width:auto;margin:4px">📥 导出CSV</button>
      <button class="btn btn-outline" onclick="switchTab('sell')" style="display:inline;width:auto;margin:4px">📋 查看卖出策略</button>
    </div>
  `;
}

// ============================================================
// SELL PLAN RENDERING
// ============================================================
function renderSellPlans(){
  const content=$('sellContent');
  if(!lastResults.length){
    content.innerHTML='<div style="text-align:center;padding:40px;color:var(--sub)">暂无数据，请先在「筛选」页运行一次 ⬆️</div>';
    return;
  }

  content.innerHTML=`
    <div style="font-size:13px;color:var(--sub);margin-bottom:8px">
      ${lastResults.length} 只标的 · 一夜持股核心：次日必须卖出！
    </div>
    ${lastResults.map((r,i)=>{
      const plan=lastSellPlans[r.code]||generateSellPlan(r,lastMarketEnv);
      const riskEmoji={低:'🟢',中:'🟡',高:'🔴'}[plan.risk_level]||'🟡';
      const cardClass=plan.risk_level==='高'?'danger':plan.risk_level==='中'?'warn':'';
      return `
        <div class="plan-card ${cardClass}">
          <div style="font-weight:600;font-size:14px">${i+1}. ${riskEmoji} ${plan.name} <span style="font-weight:400;font-size:12px;color:var(--sub)">${plan.code}</span></div>
          <div style="margin-top:4px;display:grid;grid-template-columns:1fr 1fr;gap:4px;font-size:12px">
            <div>入场: <strong>¥${plan.entry_price.toFixed(2)}</strong></div>
            <div>信心: <strong>${plan.confidence}</strong></div>
            <div>🎯止盈: <strong class="red">¥${plan.target_price} (+${plan.target_profit_pct}%)</strong></div>
            <div>🛑止损: <strong class="green">¥${plan.stop_loss_price} (${plan.stop_loss_pct}%)</strong></div>
            <div>⏰最晚: <strong>${plan.time_limit}</strong></div>
            <div>止损方法: <strong>${plan.stop_method||'固定'}</strong></div>
          </div>
          ${plan.market_note?`<div style="font-size:11px;color:var(--red);margin-top:4px">${plan.market_note}</div>`:''}
          ${plan.atr_stop?`<div style="font-size:11px;color:var(--sub);margin-top:2px">ATR动态止损: ¥${plan.atr_stop} | ATR止盈: ¥${plan.atr_target}</div>`:''}
        </div>
      `;
    }).join('')}
    <div class="warn-box" style="margin-top:12px">
      ⚠️ <strong>纪律提醒：</strong>一夜持股法的核心是「一夜」——次日开盘必须清仓，无论盈亏。严守止损线，不贪婪、不侥幸。
    </div>
  `;
}

// ============================================================
// DETAIL MODAL
// ============================================================
function showDetail(code){
  const stock=lastResults.find(r=>r.code===code);
  if(!stock) return;
  const plan=lastSellPlans[code]||generateSellPlan(stock,lastMarketEnv);
  const sector=classifySector(stock.name);

  $('modalContent').innerHTML=`
    <h3>📊 ${stock.name} (${stock.code}) <span class="badge badge-blue">${sector}</span></h3>
    <div class="info-grid">
      <div class="info-item"><div class="info-label">价格</div><div class="info-num" style="font-size:16px">¥${stock.price.toFixed(2)}</div></div>
      <div class="info-item"><div class="info-label">涨跌幅</div><div class="info-num ${stock.pct_change>0?'red':'green'}" style="font-size:16px">${stock.pct_change>0?'+':''}${stock.pct_change.toFixed(2)}%</div></div>
      <div class="info-item"><div class="info-label">换手率</div><div class="info-num">${stock.turnover.toFixed(2)}%</div></div>
      <div class="info-item"><div class="info-label">量比</div><div class="info-num">${stock.volume_ratio.toFixed(2)}</div></div>
      <div class="info-item"><div class="info-label">流通市值</div><div class="info-num">${(stock.float_mcap/1e8).toFixed(1)}亿</div></div>
      <div class="info-item"><div class="info-label">PE</div><div class="info-num">${stock.pe?stock.pe.toFixed(1):'-'}</div></div>
      <div class="info-item"><div class="info-label">主力净流入</div><div class="info-num">${(stock.main_net_inflow/1e4).toFixed(0)}万</div></div>
      <div class="info-item"><div class="info-label">总分</div><div class="info-num" style="color:var(--blue);font-size:20px">${stock.total_score.toFixed(1)}</div></div>
    </div>
    <div style="margin-top:16px">
      <div class="card-title">📊 评分明细</div>
      <div class="row"><span class="label">涨跌幅 (15pts)</span><span class="value">${stock.score_pct_change||0}</span></div>
      <div class="row"><span class="label">尾盘信号 (20pts)</span><span class="value">${stock.score_tail_signal||0} <span style="font-size:11px">(${stock.tail_pattern||'N/A'})</span></span></div>
      <div class="row"><span class="label">换手率 (10pts)</span><span class="value">${stock.score_turnover||0}</span></div>
      <div class="row"><span class="label">流通市值 (8pts)</span><span class="value">${stock.score_float_mcap||0}</span></div>
      <div class="row"><span class="label">资金流向 (12pts)</span><span class="value">${stock.score_fund_flow||0}</span></div>
      <div class="row"><span class="label">板块排名 (8pts)</span><span class="value">${stock.score_sector_rank||0}</span></div>
      <div class="row"><span class="label">安全过滤 (7pts)</span><span class="value">${stock.score_safety_filter||0}</span></div>
      <div class="row"><span class="label">大盘环境 (10pts)</span><span class="value">${stock.score_market_env||0}</span></div>
      <div class="row"><span class="label">趋势位置 (10pts)</span><span class="value">${stock.score_trend_position||0} <span style="font-size:11px">(MA${stock.trend_ma||'?'})</span></span></div>
    </div>
    <div style="margin-top:16px">
      <div class="card-title">📋 卖出策略</div>
      <div class="row"><span class="label">入场价</span><span class="value">¥${plan.entry_price.toFixed(2)}</span></div>
      <div class="row"><span class="label">🎯止盈</span><span class="value red">¥${plan.target_price} (+${plan.target_profit_pct}%)</span></div>
      <div class="row"><span class="label">🛑止损</span><span class="value green">¥${plan.stop_loss_price} (${plan.stop_loss_pct}%)</span></div>
      <div class="row"><span class="label">⏰最晚清仓</span><span class="value">${plan.time_limit}</span></div>
      <div class="row"><span class="label">风险等级</span><span class="value">${plan.risk_level}</span></div>
    </div>
    <button class="btn btn-primary" onclick="closeModal()" style="margin-top:16px">关闭</button>
  `;
  $('modal').style.display='flex';
}

function closeModal(e){
  if(e&&e.target!==$('modal')) return;
  $('modal').style.display='none';
}

// ============================================================
// EXPORT
// ============================================================
function exportCSV(){
  if(!lastResults.length){toast('无数据可导出');return}
  const headers=['代码','名称','涨跌幅%','换手率%','流通市值(亿)','主力净流入(万)','量比','PE','总分','行业','尾盘形态','止盈价','止损价','最晚清仓'];
  const rows=lastResults.map(r=>{
    const plan=lastSellPlans[r.code]||{};
    return [
      r.code,r.name,r.pct_change.toFixed(2),r.turnover.toFixed(2),(r.float_mcap/1e8).toFixed(1),
      (r.main_net_inflow/1e4).toFixed(0),r.volume_ratio.toFixed(2),r.pe?r.pe.toFixed(1):'',
      r.total_score.toFixed(1),classifySector(r.name),r.tail_pattern||'N/A',
      plan.target_price||'',plan.stop_loss_price||'',plan.time_limit||''
    ].join(',');
  });
  const csv='﻿'+headers.join(',')+'\n'+rows.join('\n');
  const blob=new Blob([csv],{type:'text/csv;charset=utf-8'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download='一夜持股法_筛选结果.csv';
  document.body.appendChild(a);a.click();document.body.removeChild(a);
  URL.revokeObjectURL(url);
  toast('✅ CSV已下载');
}

// ============================================================
// UI
// ============================================================
function switchTab(tab){
  ['screen','premarket','sell','backtest'].forEach(t=>$(`tab-${t}`).style.display=t===tab?'':'none');
  document.querySelectorAll('.tab').forEach((el,i)=>el.classList.toggle('active',
    (i===0&&tab==='screen')||(i===1&&tab==='premarket')||(i===2&&tab==='sell')||(i===3&&tab==='backtest')));
  if(tab==='sell') renderSellPlans();
}
function toggleDark(){
  isDark=!isDark;
  document.body.classList.toggle('dark',isDark);
  localStorage.setItem('overnight_dark',isDark?'1':'0');
}

// ============================================================
// INIT
// ============================================================
function init(){
  // Restore dark mode
  if(localStorage.getItem('overnight_dark')==='1'){isDark=true;document.body.classList.add('dark')}
  // Header time
  const now=new Date();
  $('headerTime').textContent=`${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')} ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')} · 交易日${[0,6].includes(now.getDay())?'（周末休市）':''}`;

  // Auto-run with mock on load
  setTimeout(()=>runScreen(false),500);
}

init();
</script>
